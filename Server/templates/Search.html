<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .gallery {
    display: flex;
    flex-wrap: wrap;
    gap: 15px;
    margin-top: 20px;
    align-items: center;
    justify-content: center;
}

.item {
    width: 200px;
}

.item img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    border-radius: 10px;
    transition: transform 0.2s;
}

.item img:hover {
    transform: scale(1.05);
}
.home-btn {
    margin-top: 20px;
    padding: 10px 20px;
    background-color: #4CAF50;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

.home-btn:hover {
    background-color: #45a049;
}
    </style>
</head>
<body>
<div class="gallery">
  {% for path,score in result %}
    <div class="item">
        <p>Score: {{ "%.3f"|format(score) }}</p>
      <img src="/images/{{ path }}" />
    </div>
  {% endfor %}
    <a href="{{ url_for('home_page') }}">
    <button class="home-btn">Quay về trang chủ</button>
    </a>
</div>
</body>
</html>
